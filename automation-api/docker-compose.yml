services:
  automation-api:
    build:
      context: .
      target: production
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "${AUTOMATION_API_PORT:-3050}:3050"
    env_file:
      - src/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3050/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
